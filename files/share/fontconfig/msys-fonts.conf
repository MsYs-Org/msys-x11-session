<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!-- Retain the board's font directories and language fallback rules. -->
  <include ignore_missing="no">/etc/fonts/fonts.conf</include>

  <!-- Xvfb/Xorg on the SPI target exposes no trustworthy physical size. -->
  <match target="pattern">
    <edit name="dpi" mode="assign" binding="strong"><double>96</double></edit>
  </match>

  <!-- Rotation and BGR scanout make LCD subpixel order non-portable. -->
  <match target="font">
    <edit name="antialias" mode="assign" binding="strong"><bool>true</bool></edit>
    <edit name="hinting" mode="assign" binding="strong"><bool>true</bool></edit>
    <edit name="hintstyle" mode="assign" binding="strong"><const>hintslight</const></edit>
    <edit name="autohint" mode="assign" binding="strong"><bool>false</bool></edit>
    <edit name="embeddedbitmap" mode="assign" binding="strong"><bool>false</bool></edit>
    <edit name="rgba" mode="assign" binding="strong"><const>none</const></edit>
  </match>
</fontconfig>
